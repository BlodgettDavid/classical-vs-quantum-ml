services:
  jupyter:
    build: .
    container_name: classical-vs-quantum-ml-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./src:/app/src
      - ./notebooks:/app/notebooks
      - ./results:/app/results
      - ./plots:/app/plots
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --NotebookApp.token='' --allow-root
    environment:
      - JUPYTER_ENABLE_LAB=yes